document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<title>Dashboard · DexwinPay<\u002Ftitle>\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<style>/* =========================================================================\n   DEXWIN DESIGN SYSTEM — Colors & Type\n   Derived from Untitled UI (Tailwind-based palette).\n   Brand: Dexwin HR (Ghana). Primary: Green #02AA69.\n   ========================================================================= */\n\n/* --- Fonts ---------------------------------------------------------------- */\n@font-face {\n  font-family: \"Maven Pro\";\n  src: url(\"783fd9a9-9b11-4c60-9417-12e8fe0c65d4\") format(\"truetype\");\n  font-weight: 400; font-style: normal; font-display: swap;\n}\n@font-face {\n  font-family: \"Maven Pro\";\n  src: url(\"3ab66bb9-a596-4eb5-85a8-9b7d176fa6e5\") format(\"truetype\");\n  font-weight: 500; font-style: normal; font-display: swap;\n}\n@font-face {\n  font-family: \"Maven Pro\";\n  src: url(\"f9a6894a-8643-44a2-96ae-472063cfee4d\") format(\"truetype\");\n  font-weight: 600; font-style: normal; font-display: swap;\n}\n@font-face {\n  font-family: \"Maven Pro\";\n  src: url(\"2158ef1e-454e-4059-ab40-7bf0e7cac381\") format(\"truetype\");\n  font-weight: 700; font-style: normal; font-display: swap;\n}\n@font-face {\n  font-family: \"Maven Pro\";\n  src: url(\"5c52b1d7-f8b0-4299-8d2c-c83a0fb54c1e\") format(\"truetype\");\n  font-weight: 800; font-style: normal; font-display: swap;\n}\n@font-face {\n  font-family: \"Maven Pro\";\n  src: url(\"5950212a-e129-4d3d-a006-2467666e5f02\") format(\"truetype\");\n  font-weight: 900; font-style: normal; font-display: swap;\n}\n\n:root {\n  /* ====================================================================\n     COLOR PRIMITIVES (Untitled UI / Tailwind scales)\n     ==================================================================== */\n\n  /* Brand — Dexwin green (custom scale anchored on #02AA69) */\n  --brand-25:  #f3fdf8;\n  --brand-50:  #e8fbf1;\n  --brand-100: #c8f4dc;\n  --brand-200: #92e7bb;\n  --brand-300: #5cd99a;\n  --brand-400: #2dc77c;\n  --brand-500: #02aa69;   /* PRIMARY */\n  --brand-600: #018f58;\n  --brand-700: #016f45;\n  --brand-800: #014f32;\n  --brand-900: #013a25;\n  --brand-950: #002618;\n\n  /* Gray (neutral, Untitled UI \"Gray (modern)\") */\n  --gray-25:  #fcfcfd;\n  --gray-50:  #fafafa;\n  --gray-100: #f5f5f5;\n  --gray-200: #e9eaeb;\n  --gray-300: #d5d7da;\n  --gray-400: #a4a7ae;\n  --gray-500: #717680;\n  --gray-600: #535862;\n  --gray-700: #414651;\n  --gray-800: #252b37;\n  --gray-900: #181d27;\n  --gray-950: #0a0d12;\n\n  /* Semantic — Error (Red) */\n  --error-25:  #fffbfa;\n  --error-50:  #fef3f2;\n  --error-100: #fee4e2;\n  --error-200: #fecdca;\n  --error-300: #fda29b;\n  --error-400: #f97066;\n  --error-500: #f04438;\n  --error-600: #d92d20;\n  --error-700: #b42318;\n  --error-800: #912018;\n  --error-900: #7a271a;\n\n  /* Semantic — Warning (Amber/Yellow) */\n  --warning-25:  #fffcf5;\n  --warning-50:  #fffaeb;\n  --warning-100: #fef0c7;\n  --warning-200: #fedf89;\n  --warning-300: #fec84b;\n  --warning-400: #fdb022;\n  --warning-500: #f79009;\n  --warning-600: #dc6803;\n  --warning-700: #b54708;\n  --warning-800: #93370d;\n  --warning-900: #7a2e0e;\n\n  /* Semantic — Success — alias of brand green for status badges */\n  --success-25:  #f6fef9;\n  --success-50:  #ecfdf3;\n  --success-100: #d1fadf;\n  --success-200: #a6f4c5;\n  --success-300: #6ce9a6;\n  --success-400: #32d583;\n  --success-500: #12b76a;\n  --success-600: #039855;\n  --success-700: #027a48;\n  --success-800: #05603a;\n  --success-900: #054f31;\n\n  /* Semantic — Info (Blue) */\n  --info-25:  #f5faff;\n  --info-50:  #eff8ff;\n  --info-100: #d1e9ff;\n  --info-200: #b2ddff;\n  --info-300: #84caff;\n  --info-400: #53b1fd;\n  --info-500: #2e90fa;\n  --info-600: #1570ef;\n  --info-700: #175cd3;\n  --info-800: #1849a9;\n  --info-900: #194185;\n\n  /* Accent — used in tags / charts (orange, pink, indigo, teal, purple) */\n  --orange-500: #ef6820;\n  --orange-100: #fde6cf;\n  --orange-700: #b93815;\n  --pink-500:   #ee46bc;\n  --pink-100:   #fce7f6;\n  --pink-700:   #c11574;\n  --indigo-500: #6172f3;\n  --indigo-100: #e0eaff;\n  --indigo-700: #3538cd;\n  --teal-500:   #15b79e;\n  --teal-100:   #ccfbef;\n  --teal-700:   #107569;\n  --purple-500: #7a5af8;\n  --purple-100: #ebe9fe;\n  --purple-700: #5925dc;\n\n  /* Alpha utilities */\n  --alpha-white-10: rgba(255,255,255,0.10);\n  --alpha-white-20: rgba(255,255,255,0.20);\n  --alpha-white-50: rgba(255,255,255,0.50);\n  --alpha-white-80: rgba(255,255,255,0.80);\n  --alpha-black-10: rgba(10,13,18,0.10);\n  --alpha-black-20: rgba(10,13,18,0.20);\n  --alpha-black-50: rgba(10,13,18,0.50);\n\n  /* ====================================================================\n     SEMANTIC TOKENS — fg / bg / border\n     ==================================================================== */\n\n  /* Foreground (text & icons) */\n  --fg-primary:        var(--gray-900);   /* headings, body */\n  --fg-secondary:      var(--gray-700);   /* secondary text */\n  --fg-tertiary:       var(--gray-600);   /* tertiary / meta */\n  --fg-quaternary:     var(--gray-500);   /* placeholder / muted */\n  --fg-disabled:       var(--gray-400);\n  --fg-placeholder:    var(--gray-500);\n  --fg-on-brand:       #ffffff;\n  --fg-brand:          var(--brand-700);\n  --fg-brand-soft:     var(--brand-600);\n  --fg-error:          var(--error-600);\n  --fg-warning:        var(--warning-700);\n  --fg-success:        var(--success-700);\n  --fg-white:          #ffffff;\n\n  /* Background */\n  --bg-primary:        #ffffff;\n  --bg-secondary:      var(--gray-50);\n  --bg-tertiary:       var(--gray-100);\n  --bg-quaternary:     var(--gray-200);\n  --bg-active:         var(--gray-50);\n  --bg-disabled:       var(--gray-100);\n  --bg-overlay:        rgba(10, 13, 18, 0.5);\n  --bg-brand-primary:  var(--brand-500);\n  --bg-brand-hover:    var(--brand-600);\n  --bg-brand-solid:    var(--brand-600);   /* default solid btn fill (figma uses brand-600) */\n  --bg-brand-solid-hover: var(--brand-700);\n  --bg-brand-subtle:   var(--brand-50);\n  --bg-brand-dark:     var(--brand-900);   /* hero on marketing */\n  --bg-error-primary:  var(--error-500);\n  --bg-error-subtle:   var(--error-50);\n  --bg-warning-subtle: var(--warning-50);\n  --bg-success-subtle: var(--success-50);\n  --bg-info-subtle:    var(--info-50);\n\n  /* Border */\n  --border-primary:    var(--gray-300);\n  --border-secondary:  var(--gray-200);\n  --border-tertiary:   var(--gray-100);\n  --border-disabled:   var(--gray-200);\n  --border-brand:      var(--brand-500);\n  --border-brand-solid:var(--brand-600);\n  --border-error:      var(--error-500);\n  --border-on-dark:    rgba(255,255,255,0.12);\n\n  /* ====================================================================\n     RADII\n     ==================================================================== */\n  --radius-none: 0px;\n  --radius-xxs:  2px;\n  --radius-xs:   4px;\n  --radius-sm:   6px;\n  --radius-md:   8px;\n  --radius-lg:   10px;\n  --radius-xl:   12px;\n  --radius-2xl:  16px;\n  --radius-3xl:  20px;\n  --radius-4xl:  24px;\n  --radius-full: 9999px;\n\n  /* ====================================================================\n     SPACING — derived from a 4px base\n     ==================================================================== */\n  --space-0:   0px;\n  --space-0\\.5: 2px;\n  --space-1:   4px;\n  --space-1\\.5: 6px;\n  --space-2:   8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  20px;\n  --space-6:  24px;\n  --space-8:  32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n  --space-24: 96px;\n\n  /* ====================================================================\n     SHADOWS — Untitled UI elevation\n     ==================================================================== */\n  --shadow-xs:  0px 1px 2px 0px rgba(10,13,18,0.05);\n  --shadow-sm:  0px 1px 3px 0px rgba(10,13,18,0.10), 0px 1px 2px -1px rgba(10,13,18,0.10);\n  --shadow-md:  0px 4px 6px -1px rgba(10,13,18,0.10), 0px 2px 4px -2px rgba(10,13,18,0.06);\n  --shadow-lg:  0px 12px 16px -4px rgba(10,13,18,0.08), 0px 4px 6px -2px rgba(10,13,18,0.03);\n  --shadow-xl:  0px 20px 24px -4px rgba(10,13,18,0.08), 0px 8px 8px -4px rgba(10,13,18,0.03);\n  --shadow-2xl: 0px 24px 48px -12px rgba(10,13,18,0.18);\n  --shadow-3xl: 0px 32px 64px -12px rgba(10,13,18,0.14);\n\n  /* Focus ring */\n  --ring-brand:  0 0 0 4px rgba(2,170,105,0.24);\n  --ring-error:  0 0 0 4px rgba(240,68,56,0.24);\n  --ring-gray:   0 0 0 4px rgba(152,162,179,0.14);\n\n  /* Button shadow (Untitled UI) */\n  --shadow-btn-primary:   0px 1px 2px 0px rgba(10,13,18,0.05), inset 0px -2px 0px 0px rgba(10,13,18,0.05), inset 0px 0px 0px 1px rgba(10,13,18,0.18);\n  --shadow-btn-secondary: 0px 1px 2px 0px rgba(10,13,18,0.05), inset 0px -2px 0px 0px rgba(10,13,18,0.05), inset 0px 0px 0px 1px rgba(10,13,18,0.18);\n\n  /* ====================================================================\n     TYPOGRAPHY\n     ==================================================================== */\n  --font-display: \"Maven Pro\", ui-sans-serif, system-ui, -apple-system, \"Segoe UI\", Helvetica, Arial, sans-serif;\n  --font-body:    \"Maven Pro\", ui-sans-serif, system-ui, -apple-system, \"Segoe UI\", Helvetica, Arial, sans-serif;\n  --font-mono:    ui-monospace, \"SF Mono\", Menlo, Consolas, \"Roboto Mono\", monospace;\n\n  /* Type scale — display (Untitled UI / Tailwind) */\n  --text-display-2xl-size: 72px;  --text-display-2xl-lh: 90px;  --text-display-2xl-ls: -0.02em;\n  --text-display-xl-size:  60px;  --text-display-xl-lh:  72px;  --text-display-xl-ls:  -0.02em;\n  --text-display-lg-size:  48px;  --text-display-lg-lh:  60px;  --text-display-lg-ls:  -0.02em;\n  --text-display-md-size:  36px;  --text-display-md-lh:  44px;  --text-display-md-ls:  -0.02em;\n  --text-display-sm-size:  30px;  --text-display-sm-lh:  38px;  --text-display-sm-ls:   0;\n  --text-display-xs-size:  24px;  --text-display-xs-lh:  32px;  --text-display-xs-ls:   0;\n\n  --text-xl-size: 20px;  --text-xl-lh: 30px;\n  --text-lg-size: 18px;  --text-lg-lh: 28px;\n  --text-md-size: 16px;  --text-md-lh: 24px;\n  --text-sm-size: 14px;  --text-sm-lh: 20px;\n  --text-xs-size: 12px;  --text-xs-lh: 18px;\n\n  /* Weights */\n  --fw-regular:  400;\n  --fw-medium:   500;\n  --fw-semibold: 600;\n  --fw-bold:     700;\n  --fw-black:    900;\n}\n\n/* =========================================================================\n   SEMANTIC TYPE STYLES — use these classes/vars directly\n   ========================================================================= */\n.h-display-2xl, .h-display-xl, .h-display-lg, .h-display-md,\n.h-display-sm,  .h-display-xs, .h1, .h2, .h3, .h4 {\n  font-family: var(--font-display);\n  color: var(--fg-primary);\n  letter-spacing: -0.02em;\n}\n.h-display-2xl { font-size: var(--text-display-2xl-size); line-height: var(--text-display-2xl-lh); font-weight: var(--fw-semibold); }\n.h-display-xl  { font-size: var(--text-display-xl-size);  line-height: var(--text-display-xl-lh);  font-weight: var(--fw-semibold); }\n.h-display-lg  { font-size: var(--text-display-lg-size);  line-height: var(--text-display-lg-lh);  font-weight: var(--fw-semibold); }\n.h-display-md  { font-size: var(--text-display-md-size);  line-height: var(--text-display-md-lh);  font-weight: var(--fw-semibold); }\n.h-display-sm  { font-size: var(--text-display-sm-size);  line-height: var(--text-display-sm-lh);  font-weight: var(--fw-semibold); letter-spacing: 0; }\n.h-display-xs  { font-size: var(--text-display-xs-size);  line-height: var(--text-display-xs-lh);  font-weight: var(--fw-semibold); letter-spacing: 0; }\n.h1 { font-size: var(--text-display-md-size); line-height: var(--text-display-md-lh); font-weight: var(--fw-semibold); }\n.h2 { font-size: var(--text-display-sm-size); line-height: var(--text-display-sm-lh); font-weight: var(--fw-semibold); letter-spacing: 0; }\n.h3 { font-size: var(--text-display-xs-size); line-height: var(--text-display-xs-lh); font-weight: var(--fw-semibold); letter-spacing: 0; }\n.h4 { font-size: var(--text-xl-size);         line-height: var(--text-xl-lh);         font-weight: var(--fw-semibold); letter-spacing: 0; }\n\n.t-xl, .t-lg, .t-md, .t-sm, .t-xs, p, body {\n  font-family: var(--font-body);\n  color: var(--fg-primary);\n}\n.t-xl { font-size: var(--text-xl-size); line-height: var(--text-xl-lh); font-weight: var(--fw-regular); }\n.t-lg { font-size: var(--text-lg-size); line-height: var(--text-lg-lh); font-weight: var(--fw-regular); }\n.t-md { font-size: var(--text-md-size); line-height: var(--text-md-lh); font-weight: var(--fw-regular); }\n.t-sm { font-size: var(--text-sm-size); line-height: var(--text-sm-lh); font-weight: var(--fw-regular); }\n.t-xs { font-size: var(--text-xs-size); line-height: var(--text-xs-lh); font-weight: var(--fw-regular); }\n\n.t-medium   { font-weight: var(--fw-medium); }\n.t-semibold { font-weight: var(--fw-semibold); }\n.t-bold     { font-weight: var(--fw-bold); }\n\n/* Convenience: muted, mono */\n.text-secondary  { color: var(--fg-secondary); }\n.text-tertiary   { color: var(--fg-tertiary); }\n.text-quaternary { color: var(--fg-quaternary); }\n.text-brand      { color: var(--fg-brand); }\n.text-error      { color: var(--fg-error); }\n.text-success    { color: var(--fg-success); }\n.font-mono       { font-family: var(--font-mono); }\n\n/* Sensible global resets that pair with the system */\nhtml, body { background: var(--bg-primary); color: var(--fg-primary); font-family: var(--font-body); }\n*, *::before, *::after { box-sizing: border-box; }\n<\u002Fstyle>\n<link rel=\"icon\" type=\"image/svg+xml\" href=\"61da0fb3-ca45-47f3-8b7b-d81ebbbde236\">\n<style>\n  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg-secondary); color: var(--fg-primary); }\n  body {\n    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;\n    display: flex; min-height: 100vh;\n  }\n  a { color: inherit; text-decoration: none; }\n  ::selection { background: var(--brand-100); color: var(--brand-900); }\n  *, *::before, *::after { box-sizing: border-box; }\n\n  .ic { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }\n  .ic-sm { width: 16px; height: 16px; }\n  .ic-lg { width: 24px; height: 24px; }\n\n  /* ============================================================ SIDEBAR */\n  .sidebar {\n    width: 296px; flex-shrink: 0;\n    background: #fff;\n    border-right: 1px solid var(--border-secondary);\n    display: flex; flex-direction: column;\n    height: 100vh; position: sticky; top: 0;\n  }\n  .side-head {\n    height: 105px; flex-shrink: 0;\n    padding: 0 28px;\n    display: flex; align-items: center; justify-content: space-between;\n    border-bottom: 1px solid var(--border-secondary);\n  }\n  .wordmark { display: inline-flex; align-items: flex-start; gap: 4px; }\n  .wordmark img { height: 30px; display: block; }\n  .wordmark .pay {\n    font-family: var(--font-display); font-weight: 900;\n    font-size: 12px; line-height: 1; color: var(--fg-primary);\n    letter-spacing: 0.04em; margin-top: 3px;\n  }\n  .collapse-btn {\n    background: none; border: 0; cursor: pointer;\n    color: var(--gray-400);\n    width: 34px; height: 34px; border-radius: var(--radius-md);\n    display: inline-flex; align-items: center; justify-content: center;\n    transition: background 120ms, color 120ms;\n  }\n  .collapse-btn:hover { background: var(--bg-secondary); color: var(--fg-secondary); }\n\n  .nav {\n    flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden;\n    padding: 14px 16px 8px;\n    scrollbar-width: thin;\n    display: flex; flex-direction: column;\n  }\n  .nav-section {\n    font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;\n    color: var(--fg-quaternary); padding: 18px 12px 8px;\n  }\n  .nav-section:first-child { padding-top: 4px; }\n  .nav-divider { height: 1px; background: var(--border-secondary); margin: 12px 12px; }\n\n  /* primary nav item */\n  .nav-item {\n    display: flex; align-items: center; gap: 12px;\n    padding: 10px 12px; border-radius: var(--radius-md);\n    color: var(--fg-secondary);\n    font-size: 15px; line-height: 22px; font-weight: 600;\n    cursor: pointer; user-select: none;\n    transition: background 120ms, color 120ms;\n    border: 0; background: none; width: 100%; text-align: left;\n    font-family: var(--font-body);\n  }\n  .nav-item .ic { width: 19px; height: 19px; color: var(--gray-500); transition: color 120ms; }\n  .nav-item:hover { background: var(--bg-secondary); }\n  .nav-item.is-active { background: var(--brand-50); color: var(--brand-700); }\n  .nav-item.is-active .ic { color: var(--brand-600); }\n  .nav-item .label { flex: 1; }\n  .nav-item .chev { color: var(--gray-400); width: 16px; height: 16px; transition: transform 200ms; flex-shrink: 0; }\n  .nav-group.open > .nav-item .chev { transform: rotate(180deg); }\n  .nav-item .amt { font-size: 13px; font-weight: 600; color: var(--fg-tertiary); }\n\n  /* sub nav */\n  .nav-sub { overflow: hidden; max-height: 0; transition: max-height 280ms ease; }\n  .nav-group.open .nav-sub { max-height: 360px; }\n  .nav-sub-inner { margin: 4px 0 6px 26px; padding-left: 14px; border-left: 1px solid var(--border-secondary); display: flex; flex-direction: column; gap: 2px; }\n  .nav-subitem {\n    display: flex; align-items: center; gap: 10px;\n    padding: 8px 12px; border-radius: var(--radius-md);\n    color: var(--fg-tertiary); font-size: 14px; line-height: 20px; font-weight: 600;\n    cursor: pointer; transition: background 120ms, color 120ms;\n  }\n  .nav-subitem:hover { background: var(--bg-secondary); color: var(--fg-secondary); }\n  .nav-subitem .label { flex: 1; }\n  .nav-subitem.dim { color: var(--fg-quaternary); }\n  .nav-subitem.dim .count { opacity: 0.7; }\n\n  /* count pill (neutral) + badge (attention) */\n  .count {\n    min-width: 24px; height: 20px; padding: 0 7px;\n    border-radius: var(--radius-full);\n    background: var(--gray-100); color: var(--fg-tertiary);\n    font-size: 11.5px; font-weight: 700; line-height: 20px;\n    display: inline-flex; align-items: center; justify-content: center;\n  }\n  .nav-item.is-active .count { background: var(--brand-100); color: var(--brand-700); }\n  .badge {\n    min-width: 22px; height: 20px; padding: 0 7px;\n    border-radius: var(--radius-full);\n    background: var(--error-500); color: #fff;\n    font-size: 11.5px; font-weight: 700; line-height: 20px;\n    display: inline-flex; align-items: center; justify-content: center;\n  }\n\n  .nav-spacer { flex: 1; min-height: 14px; }\n\n  /* user card */\n  .side-foot { padding: 10px 16px 18px; flex-shrink: 0; }\n  .user-card {\n    display: flex; align-items: center; gap: 12px;\n    padding: 10px 12px; border: 1px solid var(--border-secondary);\n    border-radius: var(--radius-xl); background: #fff;\n    cursor: pointer; transition: background 120ms, border-color 120ms;\n  }\n  .user-card:hover { background: var(--bg-secondary); }\n  .user-ava {\n    width: 38px; height: 38px; flex-shrink: 0;\n    border-radius: 999px;\n    background: var(--brand-600);\n    display: inline-flex; align-items: center; justify-content: center;\n    color: #fff; font-size: 13px; font-weight: 700; letter-spacing: 0.02em;\n  }\n  .user-meta { flex: 1; min-width: 0; }\n  .user-name { font-size: 14px; font-weight: 700; line-height: 18px; color: var(--fg-primary); }\n  .user-mail { font-size: 13px; line-height: 18px; color: var(--fg-tertiary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n  .user-card .swap { color: var(--gray-400); width: 18px; height: 18px; flex-shrink: 0; }\n\n  /* ============================================================== MAIN = */\n  .main { flex: 1 o-list\">\n\n          <!-- 1. Complete company profile (done, flush) -->\n          <article class=\"todo flush\">\n            <div class=\"todo-row\">\n              <span class=\"marker done\"><svg class=\"ic\" viewBox=\"0 0 24 24\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>\n              <div class=\"todo-main\">\n                <div class=\"todo-title\">Complete company profile<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"todo-aside\">\n                <span class=\"pill green\">Done<\u002Fspan>\n                <svg class=\"chev-link\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"9 18 15 12 9 6\"><\u002Fpolyline><\u002Fsvg>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Farticle>\n\n          <!-- 2. Setup company wallet -->\n          <article class=\"todo is-open\" data-todo=\"\">\n            <div class=\"todo-row\" data-toggle=\"\">\n              <span class=\"marker\">2<\u002Fspan>\n              <div class=\"todo-main\">\n                <div class=\"todo-title\">Setup company wallet<\u002Fdiv>\n                <p class=\"todo-desc\">Affinity our banking partner is reviewing your application. Usually takes 1–3 business days.<\u002Fp>\n              <\u002Fdiv>\n              <div class=\"todo-aside\">\n                <span class=\"pill amber\">Waiting on Affinity<\u002Fspan>\n                <svg class=\"chev-toggle\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"18 15 12 9 6 15\"><\u002Fpolyline><\u002Fsvg>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"todo-body\">\n              <div class=\"todo-body-inner\">\n                <div class=\"substeps\">\n                  <div class=\"substep is-done\">\n                    <span class=\"tick checked\"><svg class=\"ic\" viewBox=\"0 0 24 24\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>\n                    Application submitted · 5 Mar\n                  <\u002Fdiv>\n                  <div class=\"substep\">\n                    <span class=\"tick empty\"><\u002Fspan>\n                    Affinity review in progress\n                  <\u002Fdiv>\n                  <div class=\"substep\">\n                    <span class=\"tick empty\"><\u002Fspan>\n                    Fund your wallet\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Farticle>\n\n          <!-- 3. Set up your company payroll -->\n          <article class=\"todo is-open\" data-todo=\"\" id=\"todo-payroll\">\n            <div class=\"todo-row\" data-toggle=\"\">\n              <span class=\"marker\">3<\u002Fspan>\n              <div class=\"todo-main\">\n                <div class=\"todo-title\">Set up your company payroll<\u002Fdiv>\n                <p class=\"todo-desc\">Pension trustees, allowances and deductions for payees<\u002Fp>\n              <\u002Fdiv>\n              <div class=\"todo-aside\">\n                <span class=\"pill blue\">1 of 6 done<\u002Fspan>\n                <span class=\"pill green done-pill\" hidden=\"\">Done<\u002Fspan>\n                <svg class=\"chev-toggle\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"18 15 12 9 6 15\"><\u002Fpolyline><\u002Fsvg>\n                <svg class=\"chev-link done-chev\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" hidden=\"\"><polyline points=\"9 18 15 12 9 6\"><\u002Fpolyline><\u002Fsvg>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"todo-body\">\n              <div class=\"todo-body-inner\">\n                <div class=\"substeps\">\n                  <div class=\"substep is-done\">\n                    <span class=\"tick checked\"><svg class=\"ic\" viewBox=\"0 0 24 24\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>\n                    GRA + SSNIT\n                  <\u002Fdiv>\n                  <div class=\"substep\"><span class=\"tick empty\"><\u002Fspan>Pension Trustees<\u002Fdiv>\n                  <div class=\"substep\"><span class=\"tick empty\"><\u002Fspan>Allowances<\u002Fdiv>\n                  <div class=\"substep\"><span class=\"tick empty\"><\u002Fspan>Benefits In Kind<\u002Fdiv>\n                  <div class=\"substep\"><span class=\"tick empty\"><\u002Fspan>Bonuses<\u002Fdiv>\n                  <div class=\"substep\"><span class=\"tick empty\"><\u002Fspan>Deductions<\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"btn-wrap\">\n                  <a class=\"btn btn-primary\" href=\"Setup Payroll.html\">\n                    Continue Setup\n                    <svg class=\"ic\" viewBox=\"0 0 24 24\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><polyline points=\"12 5 19 12 12 19\"><\u002Fpolyline><\u002Fsvg>\n                  <\u002Fa>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Farticle>\n\n          <!-- 4. Add your Payees (collapsed) -->\n          <article class=\"todo is-open\" data-todo=\"\">\n            <div class=\"todo-row\" data-toggle=\"\">\n              <span class=\"marker\">4<\u002Fspan>\n              <div class=\"todo-main\">\n                <div class=\"todo-title\">Add people to the company<\u002Fdiv>\n                <p class=\"todo-desc\">Add at least 4 Employees, Independent Contractors, National Service Personnels (NSS) or Interns<\u002Fp>\n              <\u002Fdiv>\n              <div class=\"todo-aside\">\n                <span class=\"pill amber\">No person added<\u002Fspan>\n                <svg class=\"chev-toggle\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"18 15 12 9 6 15\"><\u002Fpolyline><\u002Fsvg>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"todo-body\">\n              <div class=\"todo-body-inner\">\n                <div class=\"add-actions\">\n                  <button type=\"button\" class=\"btn btn-ghost\">Import From Spreadsheet<\u002Fbutton>\n                  <button type=\"button\" class=\"btn btn-primary\" id=\"open-add-person\">Add Individual<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Farticle>\n\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Add person modal -->\n  <div class=\"ap-scrim\" id=\"add-person-modal\">\n    <div class=\"ap-modal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"ap-title\">\n      <div class=\"ap-head\">\n        <h3 id=\"ap-title\">Add person<\u002Fh3>\n        <button type=\"button\" class=\"ap-close\" data-ap-close=\"\" aria-label=\"Close\"><svg viewBox=\"0 0 24 24\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg><\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"ap-body\" data-ap-group=\"\">\n        <div class=\"ap-card selected\" data-ap-radio=\"\">\n          <span class=\"ap-ico\"><svg viewBox=\"0 0 24 24\"><path d=\"M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"9\" cy=\"7\" r=\"4\"><\u002Fcircle><path d=\"M23 21v-2a4 4 0 0 0-3-3.87\"><\u002Fpath><path d=\"M16 3.13a4 4 0 0 1 0 7.75\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <div class=\"ap-text\">\n            <div class=\"ap-title\">Employee<\u002Fdiv>\n            <div class=\"ap-desc\">On your company's books with a salary. Full-time, part-time, casual, or secondary employment. PAYE and SSNIT apply.<\u002Fdiv>\n          <\u002Fdiv>\n          <span class=\"ap-radio\"><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"ap-card\" data-ap-radio=\"\">\n          <span class=\"ap-ico\"><svg viewBox=\"0 0 24 24\"><path d=\"M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"9\" cy=\"7\" r=\"4\"><\u002Fcircle><path d=\"M23 21v-2a4 4 0 0 0-3-3.87\"><\u002Fpath><path d=\"M16 3.13a4 4 0 0 1 0 7.75\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <div class=\"ap-text\">\n            <div class=\"ap-title\">Independent Contractor<\u002Fdiv>\n            <div class=\"ap-desc\">Engaged for a specific service. Invoices the company; not on the payroll. Withholding tax. No PAYE, no SSNIT.<\u002Fdiv>\n          <\u002Fdiv>\n          <span class=\"ap-radio\"><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"ap-card\" data-ap-radio=\"\">\n          <span class=\"ap-ico\"><svg viewBox=\"0 0 24 24\"><path d=\"M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"9\" cy=\"7\" r=\"4\"><\u002Fcircle><path d=\"M23 21v-2a4 4 0 0 0-3-3.87\"><\u002Fpath><path d=\"M16 3.13a4 4 0 0 1 0 7.75\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <div class=\"ap-text\">\n            <div class=\"ap-title\">National Service Personnel (NSS)<\u002Fdiv>\n            <div class=\"ap-desc\">On national service, posted to your company by the NSS. Receives an allowance — no PAYE, no SSNIT.<\u002Fdiv>\n          <\u002Fdiv>\n          <span class=\"ap-radio\"><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"ap-card\" data-ap-radio=\"\">\n          <span class=\"ap-ico\"><svg viewBox=\"0 0 24 24\"><path d=\"M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"9\" cy=\"7\" r=\"4\"><\u002Fcircle><path d=\"M23 21v-2a4 4 0 0 0-3-3.87\"><\u002Fpath><path d=\"M16 3.13a4 4 0 0 1 0 7.75\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <div class=\"ap-text\">\n            <div class=\"ap-title\">Intern<\u002Fdiv>\n            <div class=\"ap-desc\">Student or recent graduate gaining workplace experience. Receives a stipend or is unpaid. Subject to PAYE if the stipend exceeds the tax-free threshold; generally no SSNIT.<\u002Fdiv>\n          <\u002Fdiv>\n          <span class=\"ap-radio\"><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ap-foot\">\n        <button type=\"button\" class=\"btn btn-ghost\" data-ap-close=\"\">Cancel<\u002Fbutton>\n        <button type=\"button\" class=\"btn btn-primary\" id=\"ap-continue\">Continue<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  \n\n  <!-- Tweaks panel -->\n  <div class=\"tweaks-panel\" id=\"tweaks-panel\" hidden=\"\">\n    <div class=\"tw-head\">\n      <span>Tweaks<\u002Fspan>\n      <button class=\"tw-close\" id=\"tw-close\" aria-label=\"Close\"><svg viewBox=\"0 0 24 24\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg><\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"tw-body\">\n      <div class=\"tw-row\">\n        <div class=\"tw-label\">\n          <div class=\"tw-name\">Payroll setup complete<\u002Fdiv>\n          <div class=\"tw-sub\">Show \"Set up your company payroll\" as done<\u002Fdiv>\n        <\u002Fdiv>\n        <button class=\"tw-switch\" id=\"tw-payroll\" role=\"switch\" aria-checked=\"false\"><span class=\"tw-knob\"><\u002Fspan><\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <script>\n    // Sidebar group expand/collapse\n    document.querySelectorAll('[data-group] > .nav-item').forEach((btn) => {\n      btn.addEventListener('click', () => btn.closest('[data-group]').classList.toggle('open'));\n    });\n\n    // Checklist accordion (ignore the payroll item when it's marked done)\n    document.querySelectorAll('[data-todo] [data-toggle]').forEach((row) => {\n      row.addEventListener('click', () => {\n        const todo = row.closest('[data-todo]');\n        if (todo.classList.contains('payroll-done')) return;\n        todo.classList.toggle('is-open');\n      });\n    });\n\n    // Add-person modal\n    (function addPerson() {\n      const modal = document.getElementById('add-person-modal');\n      const openBtn = document.getElementById('open-add-person');\n      const group = modal.querySelector('[data-ap-group]');\n      const dest = { 'Employee': 'Add Employee.html' };\n      function open() { modal.classList.add('show'); }\n      function close() { modal.classList.remove('show'); }\n      openBtn.addEventListener('click', open);\n      modal.querySelectorAll('[data-ap-close]').forEach((b) => b.addEventListener('click', close));\n      modal.addEventListener('click', (e) => { if (e.target === modal) close(); });\n      document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && modal.classList.contains('show')) close(); });\n      group.querySelectorAll('[data-ap-radio]').forEach((c) => {\n        c.addEventListener('click', () => {\n          group.querySelectorAll('[data-ap-radio]').forEach((x) => x.classList.remove('selected'));\n          c.classList.add('selected');\n        });\n      });\n      document.getElementById('ap-continue').addEventListener('click', () => {\n        const sel = group.querySelector('[data-ap-radio].selected .ap-title');\n        const name = sel ? sel.textContent.trim() : 'Employee';\n        window.location.href = dest[name] || 'Add Employee.html';\n      });\n    })();\n\n    // ---- Tweaks: mark payroll setup as done ----\n    (function tweaks() {\n      const panel = document.getElementById('tweaks-panel');\n      const sw = document.getElementById('tw-payroll');\n      const art = document.getElementById('todo-payroll');\n      const marker = art.querySelector('.marker');\n      const checkSvg = '<svg class=\"ic\" viewBox=\"0 0 24 24\"><polyline points=\"20 6 9 17 4 12\"/><\u002Fsvg>';\n\n      function applyPayroll(on) {\n        art.classList.toggle('payroll-done', on);\n        if (on) { art.classList.remove('is-open'); marker.classList.add('done'); marker.innerHTML = checkSvg; }\n        else { marker.classList.remove('done'); marker.textContent = '3'; }\n        document.getElementById('pfill').style.width = on ? '62%' : '37%';\n        document.getElementById('pcount').textContent = on ? '2 of 4 done' : '1 of 4 done';\n        sw.classList.toggle('on', on);\n        sw.setAttribute('aria-checked', on ? 'true' : 'false');\n      }\n\n      let on = localStorage.getItem('dexwin_payroll_done') === '1';\n      applyPayroll(on);\n\n      sw.addEventListener('click', () => {\n        on = !on;\n        localStorage.setItem('dexwin_payroll_done', on ? '1' : '0');\n        applyPayroll(on);\n        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { payrollDone: on } }, '*');\n      });\n\n      // host protocol\n      window.addEventListener('message', (e) => {\n        const t = e && e.data && e.data.type;\n        if (t === '__activate_edit_mode') panel.hidden = false;\n        else if (t === '__deactivate_edit_mode') panel.hidden = true;\n      });\n      document.getElementById('tw-close').addEventListener('click', () => {\n        panel.hidden = true;\n        window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');\n      });\n      window.parent.postMessage({ type: '__edit_mode_available' }, '*');\n    })();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
