<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Account activated · Dexwin Pay</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="icon" type="image/svg+xml" href="assets/dexwin-mark.svg">
<style>
  html, body { margin: 0; padding: 0; min-height: 100vh; color: var(--fg-primary); }
  body {
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    background: #fafbfb url("assets/topo-bg.png") center/cover no-repeat fixed;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 48px 24px;
    box-sizing: border-box;
  }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--brand-100); color: var(--brand-900); }

  .card {
    width: 100%;
    max-width: 560px;
    background: #fff;
    border-radius: var(--radius-2xl);
    padding: 64px 64px 56px;
    box-sizing: border-box;
    box-shadow: 0 1px 2px rgba(10,13,18,0.04), 0 12px 32px -8px rgba(10,13,18,0.08);
    display: flex; flex-direction: column;
    align-items: center;
  }
  @media (max-width: 640px) {
    .card { padding: 48px 24px 40px; border-radius: var(--radius-xl); }
  }

  .icon-bubble {
    width: 64px; height: 64px;
    border-radius: 999px;
    background: var(--brand-50);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--brand-700);
    margin-bottom: 24px;
  }
  .icon-bubble svg {
    width: 28px; height: 28px;
    stroke: currentColor; fill: none;
    stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round;
  }

  h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 30px;
    line-height: 38px;
    letter-spacing: -0.02em;
    color: var(--fg-primary);
    margin: 0 0 12px;
    text-align: center;
  }
  .sub {
    font-size: 15px; line-height: 22px;
    color: var(--fg-tertiary);
    margin: 0 0 32px;
    text-align: center;
    max-width: 36ch;
    text-wrap: balance;
  }

  .btn {
    width: 100%;
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    font-family: inherit; font-weight: 600; font-size: 15px; line-height: 24px;
    padding: 14px 22px;
    border-radius: var(--radius-full);
    border: 0; cursor: pointer;
    transition: background 120ms ease, box-shadow 120ms ease;
    white-space: nowrap;
    box-sizing: border-box;
    background: var(--bg-brand-solid);
    color: #fff;
    box-shadow: var(--shadow-btn-primary);
  }
  .btn:hover { background: var(--bg-brand-solid-hover); }
  .btn .ic {
    width: 18px; height: 18px;
    stroke: currentColor; fill: none;
    stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round;
  }

  .brand-foot {
    margin-top: 40px;
    display: inline-flex; align-items: flex-start; gap: 3px;
  }
  .brand-foot img { height: 28px; display: block; }
  .brand-foot .pay {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 11px;
    line-height: 1;
    color: var(--fg-primary);
    letter-spacing: 0.04em;
    margin-top: 3px;
  }
</style>
</head>
<body data-screen-label="Account activated">

  <div class="card">
    <div class="icon-bubble" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M14 19v-1a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v1"/>
        <circle cx="8" cy="7" r="4"/>
        <polyline points="16 11 18 13 22 9"/>
      </svg>
    </div>

    <h1>Account Activated</h1>
    <p class="sub">Your account has been successfully activated.<br>Please sign in to continue.</p>

    <a href="Login.html" class="btn">
      Go to sign in
      <svg class="ic" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>

    <a class="brand-foot" href="Landing Page.html" aria-label="Dexwin Pay">
      <img src="assets/dexwin-logo.svg" alt="Dexwin">
      <span class="pay">PAY</span>
    </a>
  </div>

</body>
</html>
