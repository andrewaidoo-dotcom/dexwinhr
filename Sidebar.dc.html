<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="_ds/dexwinpay-design-system-848e17b8-ea65-4390-9f5b-4650ab9f91b8/fonts/fonts.css">
  <link rel="stylesheet" href="_ds/dexwinpay-design-system-848e17b8-ea65-4390-9f5b-4650ab9f91b8/tokens/colors.css">
  <link rel="stylesheet" href="_ds/dexwinpay-design-system-848e17b8-ea65-4390-9f5b-4650ab9f91b8/tokens/typography.css">
  <link rel="stylesheet" href="_ds/dexwinpay-design-system-848e17b8-ea65-4390-9f5b-4650ab9f91b8/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/dexwinpay-design-system-848e17b8-ea65-4390-9f5b-4650ab9f91b8/tokens/shadows.css">
  <link rel="stylesheet" href="_ds/dexwinpay-design-system-848e17b8-ea65-4390-9f5b-4650ab9f91b8/tokens/base.css">
  <link rel="stylesheet" href="_ds/dexwinpay-design-system-848e17b8-ea65-4390-9f5b-4650ab9f91b8/styles.css">
  <script src="./app-state.js"></script>
</helmet>
<aside style="width:288px;flex-shrink:0;background:#fff;border-right:1px solid var(--border-secondary);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;font-family:var(--font-body);color:var(--fg-primary);">
  <div style="height:{{ topHeight }};flex-shrink:0;padding:0 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-secondary);">
    <span style="display:flex;align-items:baseline;gap:3px;">
      <img src="assets/dexwin-logo.svg" alt="Dexwin" style="height:24px;">
      <span style="font-family:var(--font-display);font-weight:900;font-size:11px;letter-spacing:0.04em;color:var(--fg-primary);">PAY</span>
    </span>
    <span style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;color:var(--fg-quaternary);cursor:pointer;transition:background 120ms ease;" style-hover="background:var(--bg-tertiary);">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"></rect><path d="M9 3v18"></path></svg>
    </span>
  </div>

  <nav data-tour="nav" style="flex: 1; overflow-y: auto; padding: 4px 16px 16px; display: flex; flex-direction: column; gap: 2px; padding-top: 24px">
    <a href="Dashboard Page.dc.html" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-md);background:{{ nav.dashboard.bg }};color:{{ nav.dashboard.fg }};font-size:15px;font-weight:600;text-decoration:none;transition:background 120ms ease;" style-hover="background:{{ nav.dashboard.hover }}">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="{{ nav.dashboard.stroke }}" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"><path d="M7 2.5H3.83333C3.36662 2.5 3.13327 2.5 2.95501 2.59083C2.79821 2.67072 2.67072 2.79821 2.59083 2.95501C2.5 3.13327 2.5 3.36662 2.5 3.83333V7C2.5 7.46671 2.5 7.70007 2.59083 7.87833C2.67072 8.03513 2.79821 8.16261 2.95501 8.24251C3.13327 8.33333 3.36662 8.33333 3.83333 8.33333H7C7.46671 8.33333 7.70007 8.33333 7.87833 8.24251C8.03513 8.16261 8.16261 8.03513 8.24251 7.87833C8.33333 7.70007 8.33333 7.46671 8.33333 7V3.83333C8.33333 3.36662 8.33333 3.13327 8.24251 2.95501C8.16261 2.79821 8.03513 2.67072 7.87833 2.59083C7.70007 2.5 7.46671 2.5 7 2.5Z"></path><path d="M16.1667 2.5H13C12.5333 2.5 12.2999 2.5 12.1217 2.59083C11.9649 2.67072 11.8374 2.79821 11.7575 2.95501C11.6667 3.13327 11.6667 3.36662 11.6667 3.83333V7C11.6667 7.46671 11.6667 7.70007 11.7575 7.87833C11.8374 8.03513 11.9649 8.16261 12.1217 8.24251C12.2999 8.33333 12.5333 8.33333 13 8.33333H16.1667C16.6334 8.33333 16.8667 8.33333 17.045 8.24251C17.2018 8.16261 17.3293 8.03513 17.4092 7.87833C17.5 7.70007 17.5 7.46671 17.5 7V3.83333C17.5 3.36662 17.5 3.13327 17.4092 2.95501C17.3293 2.79821 17.2018 2.67072 17.045 2.59083C16.8667 2.5 16.6334 2.5 16.1667 2.5Z"></path><path d="M16.1667 11.6667H13C12.5333 11.6667 12.2999 11.6667 12.1217 11.7575C11.9649 11.8374 11.8374 11.9649 11.7575 12.1217C11.6667 12.2999 11.6667 12.5333 11.6667 13V16.1667C11.6667 16.6334 11.6667 16.8667 11.7575 17.045C11.8374 17.2018 11.9649 17.3293 12.1217 17.4092C12.2999 17.5 12.5333 17.5 13 17.5H16.1667C16.6334 17.5 16.8667 17.5 17.045 17.4092C17.2018 17.3293 17.3293 17.2018 17.4092 17.045C17.5 16.8667 17.5 16.6334 17.5 16.1667V13C17.5 12.5333 17.5 12.2999 17.4092 12.1217C17.3293 11.9649 17.2018 11.8374 17.045 11.7575C16.8667 11.6667 16.6334 11.6667 16.1667 11.6667Z"></path><path d="M7 11.6667H3.83333C3.36662 11.6667 3.13327 11.6667 2.95501 11.7575C2.79821 11.8374 2.67072 11.9649 2.59083 12.1217C2.5 12.2999 2.5 12.5333 2.5 13V16.1667C2.5 16.6334 2.5 16.8667 2.59083 17.045C2.67072 17.2018 2.79821 17.3293 2.95501 17.4092C3.13327 17.5 3.36662 17.5 3.83333 17.5H7C7.46671 17.5 7.70007 17.5 7.87833 17.4092C8.03513 17.3293 8.16261 17.2018 8.24251 17.045C8.33333 16.8667 8.33333 16.6334 8.33333 16.1667V13C8.33333 12.5333 8.33333 12.2999 8.24251 12.1217C8.16261 11.9649 8.03513 11.8374 7.87833 11.7575C7.70007 11.6667 7.46671 11.6667 7 11.6667Z"></path></svg>
      <span style="flex:1;">Dashboard</span>
    </a>

    <div style="font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--fg-quaternary);padding:18px 12px 6px;">HR</div>
    <a href="People Page.dc.html" data-tour="nav-people" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-md);background:{{ nav.people.bg }};color:{{ nav.people.fg }};font-size:15px;font-weight:600;text-decoration:none;transition:background 120ms ease;" style-hover="background:{{ nav.people.hover }}">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="{{ nav.people.stroke }}" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
      <span style="flex:1;">People</span>
    </a>
    <div style="font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--fg-quaternary);padding:18px 12px 6px;">Finance</div>
    <a href="Payroll Page.dc.html" data-tour="nav-payroll" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-md);background:{{ nav.payroll.bg }};color:{{ nav.payroll.fg }};font-size:15px;font-weight:600;text-decoration:none;transition:background 120ms ease;" style-hover="background:{{ nav.payroll.hover }}">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="{{ nav.payroll.stroke }}" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2v20l2-1.5L8 22l2-1.5L12 22l2-1.5L16 22l2-1.5L20 22V2l-2 1.5L16 2l-2 1.5L12 2l-2 1.5L8 2 6 3.5 4 2Z"></path><path d="m9 12 2 2 4-4"></path></svg>
      <span style="flex:1;">Payroll</span>
    </a>
    <a href="Company Wallet.dc.html" data-tour="wallet" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-md);background:{{ nav.wallets.bg }};color:{{ nav.wallets.fg }};font-size:15px;font-weight:600;text-decoration:none;transition:background 120ms ease;" style-hover="background:{{ nav.wallets.hover }}">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="{{ nav.wallets.stroke }}" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"></path><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"></path></svg>
      <span style="flex:1;">Wallets</span>
      <sc-if value="{{ showWalletBalance }}" hint-placeholder-val="{{ false }}">
        <span style="font-size:12px;font-weight:700;color:var(--fg-tertiary);padding:3px 10px;border-radius:999px;border:1px solid var(--border-secondary);font-variant-numeric:tabular-nums;">{{ wallet }}</span>
      </sc-if>
      <sc-if value="{{ showWalletPending }}" hint-placeholder-val="{{ false }}">
        <span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#B54708;background:#FFFAEB;padding:3px 9px;border-radius:999px;border:1px solid #FEDF89;">
          <span style="width:5px;height:5px;border-radius:999px;background:#F79009;"></span>Pending
        </span>
      </sc-if>
    </a>
  </nav>

  <sc-if value="{{ showTodo }}" hint-placeholder-val="{{ true }}">
  <div style="padding:8px 16px 4px;flex-shrink:0;">
    <div data-tour="todo" style="border:1px solid var(--border-secondary);border-radius:14px;padding:16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <span style="font-family:var(--font-display);font-size:15px;font-weight:800;letter-spacing:-0.01em;color:var(--fg-primary);">Things to do</span>
        <span style="font-size:13px;color:var(--fg-tertiary);">{{ completed }}/4 Done</span>
      </div>
      <div style="height:8px;border-radius:999px;background:var(--gray-100);overflow:hidden;margin-bottom:14px;"><div style="height:100%;width:{{ progress }};background:var(--brand-600);border-radius:999px;transition:width 300ms ease;"></div></div>
      <div style="display:flex;flex-direction:column;gap:11px;">
        <sc-for list="{{ todos }}" as="t" hint-placeholder-count="4">
          <a href="{{ t.href }}" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
            <sc-if value="{{ t.done }}" hint-placeholder-val="{{ false }}">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;"><circle cx="12" cy="12" r="10" fill="var(--brand-600)"></circle><path d="m8.5 12 2.2 2.2 4.8-5" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            </sc-if>
            <sc-if value="{{ t.pending }}" hint-placeholder-val="{{ true }}">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gray-400)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><circle cx="12" cy="12" r="9"></circle><path d="m8.5 12 2.2 2.2 4.8-5"></path></svg>
            </sc-if>
            <span style="font-size:14px;color:{{ t.color }};font-weight:{{ t.weight }};text-decoration:{{ t.deco }};">{{ t.label }}</span>
          </a>
        </sc-for>
      </div>
      <a href="{{ continueHref }}" onClick="{{ startContinue }}" style="display:block;box-sizing:border-box;text-align:center;text-decoration:none;width:100%;margin-top:16px;padding:11px;font-family:var(--font-body);font-weight:700;font-size:14px;color:var(--fg-secondary);background:#fff;border:1px solid var(--border-primary);border-radius:var(--radius-full);box-shadow:var(--shadow-xs);cursor:pointer;transition:background 120ms ease;" style-hover="background:var(--bg-tertiary);">Continue setup</a>
    </div>
  </div>
  </sc-if>

  <div style="padding:8px 16px;display:flex;flex-direction:column;gap:2px;flex-shrink:0;">
    <a href="#" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-md);color:var(--fg-secondary);font-size:15px;font-weight:600;text-decoration:none;transition:background 120ms ease;" style-hover="background:var(--bg-tertiary);">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gray-500)" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="4"></circle><line x1="4.93" y1="4.93" x2="9.17" y2="9.17"></line><line x1="14.83" y1="14.83" x2="19.07" y2="19.07"></line><line x1="14.83" y1="9.17" x2="19.07" y2="4.93"></line><line x1="4.93" y1="19.07" x2="9.17" y2="14.83"></line></svg>
      <span style="flex:1;">Support</span>
    </a>
    <a href="#" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-md);color:var(--fg-secondary);font-size:15px;font-weight:600;text-decoration:none;transition:background 120ms ease;" style-hover="background:var(--bg-tertiary);">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gray-500)" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
      <span style="flex:1;">Settings</span>
    </a>
    <a href="#" onClick="{{ signOut }}" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-md);color:var(--fg-secondary);font-size:15px;font-weight:600;text-decoration:none;transition:background 120ms ease;" style-hover="background:var(--bg-tertiary);">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gray-500)" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      <span style="flex:1;">Log out</span>
    </a>
  </div>

  <div style="padding:12px 16px 18px;flex-shrink:0;position:relative;">
    <!-- Perspective switcher popover -->
    <sc-if value="{{ personaOpen }}" hint-placeholder-val="{{ false }}">
      <div style="position:absolute;left:16px;right:16px;bottom:72px;z-index:40;background:#fff;border:1px solid var(--border-secondary);border-radius:16px;box-shadow:var(--shadow-lg);overflow:hidden;">
        <div style="padding:13px 16px 9px;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--fg-quaternary);">Switch perspective (demo)</div>
        <div style="padding:0 8px 8px;display:flex;flex-direction:column;gap:2px;">
          <sc-for list="{{ personas }}" as="p" hint-placeholder-count="2">
            <button onClick="{{ p.onSelect }}" style="display:flex;align-items:center;gap:11px;width:100%;box-sizing:border-box;text-align:left;padding:10px 11px;background:{{ p.bg }};border:none;border-radius:11px;cursor:pointer;font-family:var(--font-body);transition:background 120ms ease;" style-hover="background:var(--bg-tertiary);">
              <span style="position:relative;flex-shrink:0;width:34px;height:34px;border-radius:999px;background:{{ p.avBg }};color:{{ p.avFg }};display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:13px;">{{ p.init }}
                <sc-if value="{{ p.dot }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;top:-1px;right:-1px;width:11px;height:11px;border-radius:999px;background:var(--error-500);border:2px solid #fff;"></span></sc-if>
              </span>
              <span style="flex:1;min-width:0;">
                <span style="display:block;font-size:14px;font-weight:700;line-height:17px;color:var(--fg-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ p.name }}</span>
                <span style="display:block;font-size:12.5px;color:var(--fg-tertiary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ p.sub }}</span>
              </span>
              <sc-if value="{{ p.current }}" hint-placeholder-val="{{ false }}">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--brand-600)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><polyline points="20 6 9 17 4 12"></polyline></svg>
              </sc-if>
            </button>
          </sc-for>
        </div>
      </div>
    </sc-if>

    <div onClick="{{ togglePersona }}" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid {{ personaBorder }};background:{{ personaCardBg }};border-radius:var(--radius-xl);cursor:pointer;transition:background 120ms ease;" style-hover="background:var(--bg-tertiary);">
      <span style="position:relative;width:40px;height:40px;flex-shrink:0;border-radius:999px;background:{{ personaAvBg }};color:{{ personaAvFg }};display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:15px;letter-spacing:-0.01em;">{{ personaInit }}
        <sc-if value="{{ notifDot }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;top:-1px;right:-1px;width:12px;height:12px;border-radius:999px;background:var(--error-500);border:2px solid #fff;"></span></sc-if>
      </span>
      <span style="flex:1;min-width:0;">
        <span style="display:block;font-size:14px;font-weight:700;line-height:18px;color:var(--fg-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ personaName }}</span>
        <span style="display:block;font-size:13px;color:{{ personaSubColor }};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ personaSub }}</span>
      </span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--gray-400)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="m7 15 5 5 5-5"></path><path d="m7 9 5-5 5 5"></path></svg>
    </div>
  </div>

</aside>

  <!-- GLOBAL DEMO CONTROLS (appears on every page) — kept OUTSIDE the sticky <aside> so its z-index lives in the page root stacking context, not the sidebar's -->
  <sc-if value="{{ dcOpen }}" hint-placeholder-val="{{ false }}">
    <div style="position:fixed;bottom:78px;left:308px;z-index:2147483646;width:330px;background:#fff;border:1px solid var(--border-secondary);border-radius:16px;box-shadow:var(--shadow-lg);overflow:hidden;font-family:var(--font-body);">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border-secondary);">
        <span style="font-family:var(--font-display);font-size:15px;font-weight:800;letter-spacing:-0.01em;color:var(--fg-primary);">Demo controls</span>
        <span role="button" onClick="{{ toggleDc }}" aria-label="Close" style="display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:8px;color:var(--fg-quaternary);cursor:pointer;transition:background 120ms ease;" style-hover="background:var(--bg-tertiary);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"></path></svg>
        </span>
      </div>
      <div style="padding:16px 18px 18px;max-height:64vh;overflow-y:auto;">
        <div style="font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--fg-quaternary);margin-bottom:10px;">Onboarding state</div>
        <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:22px;">
          <sc-for list="{{ dcStages }}" as="o" hint-placeholder-count="5">
            <button onClick="{{ o.onClick }}" style="display:flex;align-items:flex-start;gap:11px;width:100%;box-sizing:border-box;text-align:left;padding:11px 13px;border:1.5px solid {{ o.border }};background:{{ o.bg }};border-radius:11px;cursor:pointer;font-family:var(--font-body);transition:border-color 120ms ease,background 120ms ease;">
              <span style="flex-shrink:0;margin-top:2px;display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;border:1.5px solid {{ o.dotBorder }};background:{{ o.dotBg }};">
                <sc-if value="{{ o.on }}" hint-placeholder-val="{{ false }}"><span style="width:5px;height:5px;border-radius:50%;background:#fff;"></span></sc-if>
              </span>
              <span style="min-width:0;">
                <span style="display:block;font-size:14px;font-weight:700;color:var(--fg-primary);">{{ o.label }}</span>
                <span style="display:block;font-size:12.5px;line-height:17px;color:var(--fg-tertiary);margin-top:1px;">{{ o.desc }}</span>
              </span>
            </button>
          </sc-for>
        </div>
        <button onClick="{{ resetDemo }}" style="display:flex;align-items:center;gap:11px;width:100%;box-sizing:border-box;text-align:left;padding:12px 14px;margin-bottom:22px;border:1px dashed var(--border-primary);background:var(--bg-primary);border-radius:11px;cursor:pointer;font-family:var(--font-body);transition:background 120ms ease;" style-hover="background:var(--bg-tertiary);">
          <span style="flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:8px;background:var(--gray-100);color:var(--fg-secondary);">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v6h6"></path><path d="M3 13a9 9 0 1 0 3-7.7L3 8"></path></svg>
          </span>
          <span style="min-width:0;">
            <span style="display:block;font-size:14px;font-weight:700;color:var(--fg-primary);">Reset to a blank company</span>
            <span style="display:block;font-size:12.5px;line-height:17px;color:var(--fg-tertiary);margin-top:1px;">Clears employees, drafts, pay items &amp; wallet so you can see every empty state.</span>
          </span>
        </button>
        <div style="font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--fg-quaternary);margin-bottom:10px;">Trigger a walkthrough</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          <sc-for list="{{ dcTours }}" as="t" hint-placeholder-count="3">
            <button onClick="{{ t.onClick }}" style="display:inline-flex;align-items:center;gap:7px;box-sizing:border-box;padding:8px 14px;border:1px solid var(--border-primary);background:var(--bg-primary);border-radius:999px;cursor:pointer;font-family:var(--font-body);font-size:13px;font-weight:700;color:var(--fg-secondary);box-shadow:var(--shadow-xs);transition:background 120ms ease;" style-hover="background:var(--bg-tertiary);">
              <span style="flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;color:var(--brand-600);">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="M11 8v6M8 11h6"></path></svg>
              </span>
              {{ t.label }}
            </button>
          </sc-for>
        </div>
      </div>
    </div>
  </sc-if>
  <button onClick="{{ toggleDc }}" aria-label="Demo controls" style="position:fixed;bottom:20px;left:308px;z-index:2147483647;display:inline-flex;align-items:center;gap:8px;padding:11px 18px;background:var(--fg-primary);color:#fff;border:none;border-radius:999px;box-shadow:var(--shadow-lg);cursor:pointer;font-family:var(--font-body);font-weight:700;font-size:13px;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
    Demo states
  </button>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 288, &quot;height&quot;: 820 },
  &quot;active&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;dashboard&quot;, &quot;payroll&quot;, &quot;wallets&quot;, &quot;people&quot;, &quot;none&quot;], &quot;default&quot;: &quot;people&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;wallet&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;GH₵ 0&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;topHeight&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 72, &quot;tsType&quot;: &quot;number&quot; }
}">
const ACTIVE = { bg: 'var(--brand-50)', fg: 'var(--brand-700)', stroke: 'var(--brand-600)', hover: 'var(--brand-50)' };
const IDLE = { bg: 'transparent', fg: 'var(--fg-secondary)', stroke: 'var(--gray-500)', hover: 'var(--bg-tertiary)' };
function navStyle(isActive) { return isActive ? ACTIVE : IDLE; }

class Component extends DCLogic {
  state = { acct: null, dcOpen: false, personaOpen: false };

  toggleDc = () => this.setState(s => ({ dcOpen: !s.dcOpen }));
  togglePersona = () => this.setState(s => ({ personaOpen: !s.personaOpen }));
  switchPersona = (id) => () => {
    try { if (window.AppState && window.AppState.setPerspective) window.AppState.setPerspective(id); } catch (e) {}
    try { window.location.reload(); } catch (e) {}
  };
  applyStage = (patch) => () => {
    try {
      if (window.AppState) window.AppState.set(patch);
      if (window.AppState) {
        if (patch.employees === 'done' && window.AppState.seedSampleRoster) window.AppState.seedSampleRoster();
        else if (patch.employees === 'todo' && window.AppState.clearEmployees) window.AppState.clearEmployees();
      }
      // run-level data isn't part of an onboarding stage — clear it so the scenario is coherent
      ['dxp_payroll_drafts', 'dxp_payroll_tab'].forEach(function (k) { localStorage.removeItem(k); });
      for (var i = localStorage.length - 1; i >= 0; i--) { var key = localStorage.key(i); if (key && key.indexOf('dxp_payitems_') === 0) localStorage.removeItem(key); }
      if (window.AppState && window.AppState.clearApproval) window.AppState.clearApproval();
    } catch (e) {}
    try { window.location.reload(); } catch (e) {}
  };
  resetDemo = () => {
    try {
      if (window.AppState) {
        window.AppState.set({ employees: 'todo', payroll: 'locked', wallet: 'none' });
        if (window.AppState.clearEmployees) window.AppState.clearEmployees();
        if (window.AppState.clearApproval) window.AppState.clearApproval();
        if (window.AppState.setPerspective) window.AppState.setPerspective('owner');
      }
      ['dxp_payroll_drafts', 'dxp_wallet_balance', 'dxp_payroll_tab', 'dxp_tour_resume', 'dxp_tour_done', 'dxp_skipped_tasks'].forEach(function (k) { localStorage.removeItem(k); });
      for (var i = localStorage.length - 1; i >= 0; i--) { var key = localStorage.key(i); if (key && key.indexOf('dxp_payitems_') === 0) localStorage.removeItem(key); }
    } catch (e) {}
    try { window.location.reload(); } catch (e) {}
  };
  startTour = (kind) => () => {
    try {
      if (kind === 'full') { localStorage.removeItem('dxp_tour_done'); window.location.href = 'Dashboard Page.dc.html'; return; }
      if (kind === 'people') { localStorage.setItem('dxp_tour_resume', 'people-choose'); window.location.href = 'People Page.dc.html'; return; }
      if (kind === 'payroll') { if (window.AppState) { const a = window.AppState.get(); window.AppState.set({ employees: 'done', payroll: a.payroll === 'done' ? 'done' : 'unlocked' }); } localStorage.setItem('dxp_tour_resume', 'payroll-additions'); window.location.href = 'Payroll Page.dc.html'; return; }
    } catch (e) {}
  };

  componentDidMount() {
    const load = () => {
      if (!window.AppState) return false;
      this.setState({ acct: window.AppState.getAccount() });
      return true;
    };
    if (!load()) { let n = 0; const poll = () => { if (load() || n++ > 20) return; setTimeout(poll, 30); }; poll(); }
  }

  renderVals() {
    const active = this.props.active || 'none';
    const sa = (window.AppState && window.AppState.get) ? window.AppState.get() : {};
    const draftsExist = (() => { try { const r = localStorage.getItem('dxp_payroll_drafts'); const arr = r ? JSON.parse(r) : []; return Array.isArray(arr) && arr.length > 0; } catch (e) { return false; } })();
    const TODO_LABELS = ['Add your employees', 'Set up company payroll', 'Apply for company wallet', 'Draft and pay June payroll'];
    const TODO_HREFS = ['People Page.dc.html', 'Payroll Page.dc.html', 'Company Wallet Application.dc.html', 'Payroll Page.dc.html'];
    const doneFlags = [
      sa.employees === 'done',
      sa.payroll === 'done' || sa.payroll === 'paid',
      sa.wallet === 'active',
      draftsExist && (sa.payroll === 'done' || sa.payroll === 'paid'),
    ];
    const completed = doneFlags.filter(Boolean).length;
    const firstPending = doneFlags.indexOf(false);
    const todos = TODO_LABELS.map((label, i) => {
      const done = doneFlags[i];
      const current = i === firstPending;
      return { label, href: TODO_HREFS[i], done, pending: !done, color: current ? 'var(--fg-primary)' : 'var(--fg-tertiary)', weight: current ? '700' : '600', deco: done ? 'line-through' : 'none' };
    });
    // Hide the checklist only once every onboarding step is complete (employees,
    // payroll setup, wallet active, and a payroll drafted).
    const showTodo = completed < 4;
    const ci = firstPending === -1 ? 3 : firstPending;
    const CONTINUE_HREFS = ['People Page.dc.html', 'Payroll Page.dc.html', 'Company Wallet Application.dc.html', 'Payroll Page.dc.html'];
    const CONTINUE_RESUME = ['people-choose', 'payroll-additions', '', ''];
    const continueHref = CONTINUE_HREFS[ci];
    const continueResume = CONTINUE_RESUME[ci];
    const startContinue = () => { try { if (continueResume) localStorage.setItem('dxp_tour_resume', continueResume); else localStorage.removeItem('dxp_tour_resume'); } catch (e) {} };
    const progress = Math.max(completed / 4 * 100, 10) + '%';
    const a = this.state.acct || {};
    const acctName = ((a.firstName || '') + ' ' + (a.lastName || '')).trim();
    const userName = acctName || this.props.userName || 'Your account';
    const company = a.company || this.props.company || 'Your company';
    const walletStatus = sa.wallet || 'none';
    const showWalletBalance = walletStatus === 'active';
    const showWalletPending = walletStatus === 'review';
    var _wb = (window.AppState && window.AppState.getWalletBalance) ? window.AppState.getWalletBalance() : null;
    if (_wb == null) _wb = (window.AppState && window.AppState.WB_DEFAULT) || 25000;
    const wallet = showWalletBalance ? ('GH\u20b5 ' + Number(_wb).toLocaleString('en-GH')) : (this.props.wallet || 'GH\u20b5 0');
    const topHeight = (this.props.topHeight || 72) + 'px';
    const parts = userName.trim().split(/\s+/).filter(Boolean);
    const initials = (((parts[0] || '')[0] || '') + ((parts[1] || '')[0] || '')).toUpperCase() || 'U';

    // ---- Perspective switcher (demo) ----
    const approval = (window.AppState && window.AppState.getApproval) ? window.AppState.getApproval() : null;
    const perspective = (window.AppState && window.AppState.getPerspective) ? window.AppState.getPerspective() : 'owner';
    const platformApprover = (approval && approval.route === 'platform' && approval.approver) ? approval.approver : null;
    const activeApprover = (perspective !== 'owner' && platformApprover && platformApprover.id === perspective) ? platformApprover : null;

    const ownerDot = !!(approval && (approval.status === 'approved' || approval.status === 'rejected') && !approval.ownerSeen);
    const approverDot = !!(platformApprover && approval.status === 'pending' && !approval.approverSeen);

    const OWNER_AV = { bg: 'var(--brand-50)', fg: 'var(--brand-700)' };
    const APPR_AV = { bg: '#EEF4FF', fg: '#3538CD' };
    const personas = [
      { id: 'owner', name: userName, sub: 'Account owner \u00b7 ' + company, init: initials,
        avBg: OWNER_AV.bg, avFg: OWNER_AV.fg, current: !activeApprover, dot: ownerDot && !!activeApprover,
        bg: !activeApprover ? 'var(--brand-25)' : 'transparent', onSelect: this.switchPersona('owner') },
    ];
    if (platformApprover) {
      const sub = approval.status === 'pending' ? 'Approver \u00b7 awaiting your review'
        : (approval.status === 'approved' ? 'Approver \u00b7 approved' : 'Approver \u00b7 rejected');
      personas.push({ id: platformApprover.id, name: platformApprover.name, sub, init: platformApprover.init,
        avBg: APPR_AV.bg, avFg: APPR_AV.fg, current: !!activeApprover, dot: approverDot && !activeApprover,
        bg: activeApprover ? 'var(--brand-25)' : 'transparent', onSelect: this.switchPersona(platformApprover.id) });
    }

    const STAGES = [
      { key: 'new', label: 'New company', desc: 'Nothing set up yet \u2014 payroll locked', patch: { employees: 'todo', payroll: 'locked', wallet: 'none' } },
      { key: 'emp', label: 'Employees added', desc: 'Team in place, payroll not set up', patch: { employees: 'done', payroll: 'unlocked', wallet: 'none' } },
      { key: 'pay', label: 'Payroll set up', desc: 'Ready to run payroll', patch: { employees: 'done', payroll: 'done', wallet: 'none' } },
      { key: 'wreview', label: 'Wallet in review', desc: 'Wallet application pending', patch: { employees: 'done', payroll: 'done', wallet: 'review' } },
      { key: 'wactive', label: 'Wallet active', desc: 'Fully onboarded', patch: { employees: 'done', payroll: 'done', wallet: 'active' } },
    ];
    const rosterCount = (window.AppState && window.AppState.getEmployees) ? window.AppState.getEmployees().length : 0;
    const empDone = sa.employees === 'done' || rosterCount > 0;
    const curKey = (() => {
      const w = sa.wallet || 'none';
      if (w === 'active') return 'wactive';
      if (w === 'review') return 'wreview';
      if (sa.payroll === 'done' || sa.payroll === 'paid') return 'pay';
      if (empDone) return 'emp';
      return 'new';
    })();
    const dcStages = STAGES.map(st => ({
      label: st.label, desc: st.desc, on: st.key === curKey,
      border: st.key === curKey ? 'var(--brand-600)' : 'var(--border-primary)',
      bg: st.key === curKey ? 'var(--brand-25)' : 'var(--bg-primary)',
      dotBorder: st.key === curKey ? 'var(--brand-600)' : 'var(--border-primary)',
      dotBg: st.key === curKey ? 'var(--brand-600)' : 'transparent',
      onClick: this.applyStage(st.patch),
    }));
    const dcTours = [
      { label: 'Full onboarding tour', onClick: this.startTour('full') },
      { label: 'Add employees', onClick: this.startTour('people') },
      { label: 'Set up payroll', onClick: this.startTour('payroll') },
    ];
    return {
      topHeight, userName, company, wallet, initials,
      // perspective switcher
      personas, personaOpen: this.state.personaOpen, togglePersona: this.togglePersona,
      personaName: activeApprover ? activeApprover.name : userName,
      personaSub: activeApprover ? 'Approver view \u00b7 viewing as teammate' : company,
      personaSubColor: activeApprover ? 'var(--brand-700)' : 'var(--fg-tertiary)',
      personaInit: activeApprover ? activeApprover.init : initials,
      personaAvBg: activeApprover ? APPR_AV.bg : OWNER_AV.bg,
      personaAvFg: activeApprover ? APPR_AV.fg : OWNER_AV.fg,
      personaBorder: activeApprover ? 'var(--brand-200)' : 'var(--border-secondary)',
      personaCardBg: activeApprover ? 'var(--brand-25)' : '#fff',
      notifDot: activeApprover ? approverDot : ownerDot,
      showWalletBalance, showWalletPending,
      todos, completed, progress, continueHref, startContinue, showTodo,
      dcOpen: this.state.dcOpen, toggleDc: this.toggleDc, dcStages, dcTours, resetDemo: this.resetDemo,
      signOut: (e) => { if (e) e.preventDefault(); if (window.AppState && window.AppState.signOut) window.AppState.signOut(); window.location.href = 'Login.dc.html'; },
      nav: {
        dashboard: navStyle(active === 'dashboard'),
        payroll: navStyle(active === 'payroll'),
        wallets: navStyle(active === 'wallets'),
        people: navStyle(active === 'people'),
      },
    };
  }
}
</script>
</body>
</html>
