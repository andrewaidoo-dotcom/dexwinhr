<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/dexwinpay-design-system-848e17b8-ea65-4390-9f5b-4650ab9f91b8/fonts/fonts.css">
  <link rel="stylesheet" href="_ds/dexwinpay-design-system-848e17b8-ea65-4390-9f5b-4650ab9f91b8/tokens/colors.css">
  <link rel="stylesheet" href="_ds/dexwinpay-design-system-848e17b8-ea65-4390-9f5b-4650ab9f91b8/tokens/typography.css">
  <link rel="stylesheet" href="_ds/dexwinpay-design-system-848e17b8-ea65-4390-9f5b-4650ab9f91b8/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/dexwinpay-design-system-848e17b8-ea65-4390-9f5b-4650ab9f91b8/tokens/shadows.css">
  <link rel="stylesheet" href="_ds/dexwinpay-design-system-848e17b8-ea65-4390-9f5b-4650ab9f91b8/tokens/base.css">
  <link rel="stylesheet" href="_ds/dexwinpay-design-system-848e17b8-ea65-4390-9f5b-4650ab9f91b8/styles.css">
  <script src="./app-state.js"></script>
</helmet>
<aside style="width:288px;flex-shrink:0;background:#fff;border-right:1px solid var(--border-secondary);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;font-family:var(--font-body);color:var(--fg-primary);">
  <div style="height:{{ topHeight }};flex-shrink:0;padding:0 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-secondary);">
    <span style="display:flex;align-items:baseline;gap:3px;">
      <img src="assets/dexwin-logo.svg" alt="Dexwin" style="height:24px;">
      <span style="font-family:var(--font-display);font-weight:900;font-size:11px;letter-spacing:0.04em;color:var(--fg-primary);">PAY</span>
    </span>
    <span style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;color:var(--fg-quaternary);cursor:pointer;transition:background 120ms ease;" style-hover="background:var(--bg-tertiary);">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"></rect><path d="M9 3v18"></path></svg>
    </span>
  </div>

  <nav data-tour="nav" style="flex: 1; overflow-y: auto; padding: 4px 16px 16px; display: flex; flex-direction: column; gap: 2px; padding-top: 24px">
    <a href="Dashboard Page.dc.html" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-md);background:{{ nav.dashboard.bg }};color:{{ nav.dashboard.fg }};font-size:15px;font-weight:600;text-decoration:none;transition:background 120ms ease;" style-hover="background:{{ nav.dashboard.hover }}">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="{{ nav.dashboard.stroke }}" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
      <span style="flex:1;">Dashboard</span>
    </a>

    <div style="font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--fg-quaternary);padding:18px 12px 6px;">HR</div>
    <a href="People Page.dc.html" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-md);background:{{ nav.people.bg }};color:{{ nav.people.fg }};font-size:15px;font-weight:600;text-decoration:none;transition:background 120ms ease;" style-hover="background:{{ nav.people.hover }}">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="{{ nav.people.stroke }}" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
      <span style="flex:1;">People</span>
    </a>
    <div style="font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--fg-quaternary);padding:18px 12px 6px;">Finance</div>
    <a href="Payroll Page.dc.html" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-md);background:{{ nav.payroll.bg }};color:{{ nav.payroll.fg }};font-size:15px;font-weight:600;text-decoration:none;transition:background 120ms ease;" style-hover="background:{{ nav.payroll.hover }}">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="{{ nav.payroll.stroke }}" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2v20l2-1.5L8 22l2-1.5L12 22l2-1.5L16 22l2-1.5L20 22V2l-2 1.5L16 2l-2 1.5L12 2l-2 1.5L8 2 6 3.5 4 2Z"></path><path d="m9 12 2 2 4-4"></path></svg>
      <span style="flex:1;">Payroll</span>
    </a>
    <a href="Company Wallet.dc.html" data-tour="wallet" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-md);background:{{ nav.wallets.bg }};color:{{ nav.wallets.fg }};font-size:15px;font-weight:600;text-decoration:none;transition:background 120ms ease;" style-hover="background:{{ nav.wallets.hover }}">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="{{ nav.wallets.stroke }}" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"></path><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"></path></svg>
      <span style="flex:1;">Wallets</span>
      <span style="font-size:12px;font-weight:700;color:var(--fg-tertiary);padding:3px 10px;border-radius:999px;border:1px solid var(--border-secondary);font-variant-numeric:tabular-nums;">{{ wallet }}</span>
    </a>
  </nav>

  <div style="padding:8px 16px 4px;flex-shrink:0;">
    <div style="border:1px solid var(--border-secondary);border-radius:14px;padding:16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <span style="font-family:var(--font-display);font-size:15px;font-weight:800;letter-spacing:-0.01em;color:var(--fg-primary);">Things to do</span>
        <span style="font-size:13px;color:var(--fg-tertiary);">Step {{ step }} of 4</span>
      </div>
      <div style="height:8px;border-radius:999px;background:var(--gray-100);overflow:hidden;margin-bottom:14px;"><div style="height:100%;width:{{ progress }};background:var(--brand-600);border-radius:999px;transition:width 300ms ease;"></div></div>
      <div style="display:flex;flex-direction:column;gap:11px;">
        <sc-for list="{{ todos }}" as="t" hint-placeholder-count="4">
          <a href="{{ t.href }}" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
            <sc-if value="{{ t.done }}" hint-placeholder-val="{{ false }}">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;"><circle cx="12" cy="12" r="10" fill="var(--brand-600)"></circle><path d="m8.5 12 2.2 2.2 4.8-5" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            </sc-if>
            <sc-if value="{{ t.pending }}" hint-placeholder-val="{{ true }}">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gray-400)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><circle cx="12" cy="12" r="9"></circle><path d="m8.5 12 2.2 2.2 4.8-5"></path></svg>
            </sc-if>
            <span style="font-size:14px;color:{{ t.color }};font-weight:{{ t.weight }};text-decoration:{{ t.deco }};">{{ t.label }}</span>
          </a>
        </sc-for>
      </div>
      <a href="{{ continueHref }}" style="display:block;box-sizing:border-box;text-align:center;text-decoration:none;width:100%;margin-top:16px;padding:11px;font-family:var(--font-body);font-weight:700;font-size:14px;color:var(--fg-secondary);background:#fff;border:1px solid var(--border-primary);border-radius:var(--radius-full);box-shadow:var(--shadow-xs);cursor:pointer;transition:background 120ms ease;" style-hover="background:var(--bg-tertiary);">Continue setup</a>
    </div>
  </div>

  <div style="padding:8px 16px;display:flex;flex-direction:column;gap:2px;flex-shrink:0;">
    <a href="#" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-md);color:var(--fg-secondary);font-size:15px;font-weight:600;text-decoration:none;transition:background 120ms ease;" style-hover="background:var(--bg-tertiary);">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gray-500)" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="4"></circle><line x1="4.93" y1="4.93" x2="9.17" y2="9.17"></line><line x1="14.83" y1="14.83" x2="19.07" y2="19.07"></line><line x1="14.83" y1="9.17" x2="19.07" y2="4.93"></line><line x1="4.93" y1="19.07" x2="9.17" y2="14.83"></line></svg>
      <span style="flex:1;">Support</span>
    </a>
    <a href="#" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-md);color:var(--fg-secondary);font-size:15px;font-weight:600;text-decoration:none;transition:background 120ms ease;" style-hover="background:var(--bg-tertiary);">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gray-500)" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
      <span style="flex:1;">Settings</span>
    </a>
  </div>

  <div style="padding:12px 16px 18px;flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid var(--border-secondary);border-radius:var(--radius-xl);cursor:pointer;transition:background 120ms ease;" style-hover="background:var(--bg-tertiary);">
      <span style="width:40px;height:40px;flex-shrink:0;border-radius:999px;background:var(--brand-50);color:var(--brand-700);display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:15px;letter-spacing:-0.01em;">{{ initials }}</span>
      <span style="flex:1;min-width:0;">
        <span style="display:block;font-size:14px;font-weight:700;line-height:18px;color:var(--fg-primary);">{{ userName }}</span>
        <span style="display:block;font-size:13px;color:var(--fg-tertiary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ company }}</span>
      </span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--gray-400)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="m7 15 5 5 5-5"></path><path d="m7 9 5-5 5 5"></path></svg>
    </div>
  </div>
</aside>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 288, &quot;height&quot;: 820 },
  &quot;active&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;dashboard&quot;, &quot;payroll&quot;, &quot;wallets&quot;, &quot;people&quot;, &quot;none&quot;], &quot;default&quot;: &quot;people&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;wallet&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;GH₵ 0&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;topHeight&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 72, &quot;tsType&quot;: &quot;number&quot; }
}">
const ACTIVE = { bg: 'var(--brand-50)', fg: 'var(--brand-700)', stroke: 'var(--brand-600)', hover: 'var(--brand-50)' };
const IDLE = { bg: 'transparent', fg: 'var(--fg-secondary)', stroke: 'var(--gray-500)', hover: 'var(--bg-tertiary)' };
function navStyle(isActive) { return isActive ? ACTIVE : IDLE; }

class Component extends DCLogic {
  state = { acct: null };

  componentDidMount() {
    const load = () => {
      if (!window.AppState) return false;
      this.setState({ acct: window.AppState.getAccount() });
      return true;
    };
    if (!load()) { let n = 0; const poll = () => { if (load() || n++ > 20) return; setTimeout(poll, 30); }; poll(); }
  }

  renderVals() {
    const active = this.props.active || 'none';
    const sa = (window.AppState && window.AppState.get) ? window.AppState.get() : {};
    let completed = 0;
    if (sa.employees === 'done') completed = 1;
    if (sa.payroll === 'done' || sa.payroll === 'paid') completed = Math.max(completed, 2);
    const TODO_LABELS = ['Add your employees', 'Set up company payroll', 'Apply for company wallet', 'Draft and pay June payroll'];
    const TODO_HREFS = ['People Page.dc.html', 'Set Up Payroll.dc.html', 'Company Wallet Application.dc.html', 'Payroll Page.dc.html'];
    const todos = TODO_LABELS.map((label, i) => {
      const done = i < completed;
      const current = i === completed;
      return { label, href: TODO_HREFS[i], done, pending: !done, color: current ? 'var(--fg-primary)' : 'var(--fg-tertiary)', weight: current ? '700' : '600', deco: done ? 'line-through' : 'none' };
    });
    const step = Math.min(completed + 1, 4);
    const continueHref = TODO_HREFS[Math.min(completed, 3)];
    const progress = Math.max(completed / 4 * 100, 10) + '%';
    const a = this.state.acct || {};
    const acctName = ((a.firstName || '') + ' ' + (a.lastName || '')).trim();
    const userName = acctName || this.props.userName || 'Your account';
    const company = a.company || this.props.company || 'Your company';
    const wallet = this.props.wallet || 'GH\u20b5 0';
    const topHeight = (this.props.topHeight || 72) + 'px';
    const parts = userName.trim().split(/\s+/).filter(Boolean);
    const initials = (((parts[0] || '')[0] || '') + ((parts[1] || '')[0] || '')).toUpperCase() || 'U';
    return {
      topHeight, userName, company, wallet, initials,
      todos, step, progress, continueHref,
      nav: {
        dashboard: navStyle(active === 'dashboard'),
        payroll: navStyle(active === 'payroll'),
        wallets: navStyle(active === 'wallets'),
        people: navStyle(active === 'people'),
      },
    };
  }
}
</script>
</body>
</html>
