<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Verify your email · Dexwin Pay</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="icon" type="image/svg+xml" href="assets/dexwin-mark.svg">
<style>
  html, body { margin: 0; padding: 0; min-height: 100vh; color: var(--fg-primary); }
  body {
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    background: #fafbfb url("assets/topo-bg.png") center/cover no-repeat fixed;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 48px 24px;
    box-sizing: border-box;
    gap: 28px;
  }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--brand-100); color: var(--brand-900); }

  /* =================================================== CARD ============ */
  .card {
    width: 100%;
    max-width: 560px;
    background: #fff;
    border-radius: var(--radius-2xl);
    padding: 56px 64px 48px;
    box-sizing: border-box;
    box-shadow: 0 1px 2px rgba(10,13,18,0.04), 0 12px 32px -8px rgba(10,13,18,0.08);
    display: flex; flex-direction: column;
    align-items: center;
  }
  @media (max-width: 640px) {
    .card { padding: 40px 24px 32px; border-radius: var(--radius-xl); }
  }

  /* Mail icon */
  .icon-bubble {
    width: 56px; height: 56px;
    border-radius: 999px;
    background: var(--gray-100);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--fg-secondary);
    margin-bottom: 20px;
  }
  .icon-bubble svg {
    width: 24px; height: 24px;
    stroke: currentColor; fill: none;
    stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round;
  }

  h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 30px;
    line-height: 38px;
    letter-spacing: -0.02em;
    color: var(--fg-primary);
    margin: 0 0 12px;
    text-align: center;
  }
  .sub {
    font-size: 15px; line-height: 22px;
    color: var(--fg-tertiary);
    margin: 0 0 32px;
    text-align: center;
    max-width: 42ch;
    text-wrap: balance;
  }

  /* ============================================== OTP INPUTS =========== */
  .otp {
    display: flex; gap: 12px;
    margin-bottom: 16px;
  }
  .otp-cell {
    width: 64px; height: 72px;
    text-align: center;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 36px; line-height: 1;
    color: var(--fg-quaternary);
    background: #fff;
    border: 1.5px solid var(--border-secondary);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-xs);
    transition: border-color 120ms ease, color 120ms ease, box-shadow 120ms ease;
    box-sizing: border-box;
    padding: 0;
    -moz-appearance: textfield;
  }
  .otp-cell::-webkit-outer-spin-button,
  .otp-cell::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .otp-cell:focus {
    outline: none;
    border-color: var(--brand-500);
    color: var(--brand-700);
    box-shadow: var(--ring-brand);
  }
  /* Filled state (any cell with a value) */
  .otp-cell.filled {
    border-color: var(--brand-500);
    color: var(--brand-700);
  }
  /* Placeholder zero */
  .otp-cell::placeholder { color: var(--gray-300); }

  @media (max-width: 560px) {
    .otp { gap: 8px; }
    .otp-cell { width: 48px; height: 56px; font-size: 28px; }
  }

  /* ============================================== RESEND =============== */
  .resend {
    font-size: 13px; line-height: 20px;
    color: var(--fg-tertiary);
    margin: 0 0 32px;
    text-align: center;
  }
  .resend a {
    color: var(--fg-tertiary);
    text-decoration: underline;
    text-underline-offset: 3px;
    font-weight: 500;
  }
  .resend a:hover { color: var(--brand-700); }

  /* ============================================== BUTTON =============== */
  .btn {
    width: 100%;
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    font-family: inherit; font-weight: 600; font-size: 15px; line-height: 24px;
    padding: 14px 22px;
    border-radius: var(--radius-full);
    border: 0; cursor: pointer;
    transition: background 120ms ease, color 120ms ease, box-shadow 120ms ease;
    white-space: nowrap;
    box-sizing: border-box;
  }
  .btn-primary {
    background: var(--bg-brand-solid);
    color: #fff;
    box-shadow: var(--shadow-btn-primary);
  }
  .btn-primary:hover { background: var(--bg-brand-solid-hover); }
  .btn-quiet {
    background: var(--gray-100);
    color: var(--fg-disabled);
    box-shadow: none;
  }
  .btn .ic {
    width: 18px; height: 18px;
    stroke: currentColor; fill: none;
    stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round;
  }

  /* ============================================== FOOTER BRAND ========= */
  .brand-foot {
    margin-top: 36px;
    display: inline-flex; align-items: flex-start; gap: 3px;
  }
  .brand-foot img { height: 28px; display: block; }
  .brand-foot .pay {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 11px;
    line-height: 1;
    color: var(--fg-primary);
    letter-spacing: 0.04em;
    margin-top: 3px;
  }

  /* ============================================== BACK LINK ============ */
  .back-link {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--brand-700);
    font-size: 14px; font-weight: 600;
    transition: color 120ms;
  }
  .back-link:hover { color: var(--brand-800); }
  .back-link svg {
    width: 18px; height: 18px;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }
</style>
</head>
<body data-screen-label="Verify email">

  <div class="card">
    <div class="icon-bubble" aria-hidden="true">
      <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
    </div>

    <h1>Verify your email</h1>
    <p class="sub">We've sent a 6-digit code to admin@dexwin.com. Enter the code to very your email</p>

    <div class="otp" role="group" aria-label="6-digit verification code">
      <input type="text" inputmode="numeric" maxlength="1" class="otp-cell" placeholder="0" aria-label="Digit 1">
      <input type="text" inputmode="numeric" maxlength="1" class="otp-cell" placeholder="0" aria-label="Digit 2">
      <input type="text" inputmode="numeric" maxlength="1" class="otp-cell" placeholder="0" aria-label="Digit 3">
      <input type="text" inputmode="numeric" maxlength="1" class="otp-cell" placeholder="0" aria-label="Digit 4">
      <input type="text" inputmode="numeric" maxlength="1" class="otp-cell" placeholder="0" aria-label="Digit 5">
      <input type="text" inputmode="numeric" maxlength="1" class="otp-cell" placeholder="0" aria-label="Digit 6">
    </div>

    <p class="resend">Didn't get a code? <a href="#">Click to resend</a>.</p>

    <a href="Account Activated.html" class="btn btn-primary" id="verify-btn">
      Verify &amp; continue
      <svg class="ic" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>

    <a class="brand-foot" href="Landing Page.html" aria-label="Dexwin Pay">
      <img src="assets/dexwin-logo.svg" alt="Dexwin">
      <span class="pay">PAY</span>
    </a>
  </div>

  <a class="back-link" href="Sign Up.html">
    <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to previous page
  </a>

<script>
  // Auto-advance and backspace between OTP cells. No validation.
  const cells = Array.from(document.querySelectorAll('.otp-cell'));

  cells.forEach((cell, i) => {
    cell.addEventListener('input', (e) => {
      // Keep only the last typed character, digits only
      const v = e.target.value.replace(/\D/g, '').slice(-1);
      e.target.value = v;
      e.target.classList.toggle('filled', v.length > 0);
      if (v && i < cells.length - 1) cells[i + 1].focus();
    });
    cell.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !cell.value && i > 0) {
        cells[i - 1].focus();
        cells[i - 1].value = '';
        cells[i - 1].classList.remove('filled');
        e.preventDefault();
      }
      if (e.key === 'ArrowLeft' && i > 0) { cells[i - 1].focus(); e.preventDefault(); }
      if (e.key === 'ArrowRight' && i < cells.length - 1) { cells[i + 1].focus(); e.preventDefault(); }
    });
    cell.addEventListener('paste', (e) => {
      e.preventDefault();
      const text = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, cells.length);
      [...text].forEach((ch, j) => {
        if (cells[j]) {
          cells[j].value = ch;
          cells[j].classList.add('filled');
        }
      });
      const next = Math.min(text.length, cells.length - 1);
      cells[next].focus();
    });
  });
</script>

</body>
</html>
